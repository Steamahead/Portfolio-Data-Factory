# CEE FX Volatility Pipeline — Configuration
# ============================================

# FX currency pairs (EUR as base — isolates European dynamics)
fx_pairs:
  - ticker: "EURPLN=X"
    name: "EUR/PLN"
  - ticker: "EURCZK=X"
    name: "EUR/CZK"
  - ticker: "EURHUF=X"
    name: "EUR/HUF"

# Validation ranges (reject records outside these bounds)
fx_validation:
  "EUR/PLN":
    min: 3.0
    max: 6.0
  "EUR/CZK":
    min: 20.0
    max: 30.0
  "EUR/HUF":
    min: 300.0
    max: 500.0

# yfinance settings
yfinance:
  interval: "1h"
  max_backfill_days: 730   # yfinance limit for 1h data

# RSS news sources
rss_feeds:
  - name: "bankier_waluty"
    url: "https://www.bankier.pl/rss/waluty.xml"
  - name: "bankier_gielda"
    url: "https://www.bankier.pl/rss/gielda.xml"
  - name: "money"
    url: "https://www.money.pl/rss/rss.xml"
  - name: "investing_economy"
    url: "https://pl.investing.com/rss/news_95.rss"
  # PAP Biznes nie udostepnia publicznego RSS — wylaczony
  # - name: "pap"
  #   url: "https://biznes.pap.pl/pl/rss/6"
  # ISBnews — feed nie dziala (HTTP 404 na /feed/, /rss/). Sprawdzono 2026-02-24.
  # - name: "isbnews"
  #   url: "https://www.isbnews.pl/feed/"

# Spam filter — reject headlines containing these phrases (case-insensitive)
spam_phrases:
  - "artykuł sponsorowany"
  - "materiał partnera"
  - "reklama"
  - "materiał promocyjny"

# Maximum age of RSS articles in days (older are rejected as stale)
max_article_age_days: 7

# Minimum headline length (characters)
min_headline_length: 15

# Irrelevant region filter — reject headlines about countries outside CEE/EU/US scope
# Applied only to investing_economy feed (global PMI dump)
irrelevant_regions:
  - "Mozambik"
  - "Uganda"
  - "Kenia"
  - "Zambi"          # Zambia, Zambijski
  - "Nigeria"
  - "Egipt"
  - "RPA"
  - "Ghana"
  - "Tanzania"
  - "Etiopi"
  - "Bangladesz"
  - "Pakistan"
  - "Sri Lank"
  - "Filipin"
  - "Wietnam"
  - "Tajlandi"       # Tajlandia, Tajlandzki
  - "Indonezj"
  - "Malezj"
  - "Kolumbi"
  - "Peru"
  - "Meksyk"
  - "Brazyli"
  - "Argentyn"
  - "Chile"
  - "Wenezuel"
  - "Ekwador"
  - "Birm"           # Birma/Myanmar
  - "Myanmar"
  - "Kambodż"
  - "Liban"
  - "Irak"
  - "Arabia Saudyjsk"
  - "Kazachstan"

# Gemini AI classification
gemini:
  model: "gemini-3.1-flash-lite-preview"
  # API key loaded from .env (GEMINI_API_KEY)

# News categories (for Gemini structured output)
categories:
  - "POLITYKA_KRAJOWA"
  - "MAKROEKONOMIA"
  - "RPP_STOPY"
  - "GEOPOLITYKA"
  - "INNE"
